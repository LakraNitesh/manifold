<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manifold · 03 Tree Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<script src="../assets/ml.js"></script><script src="../assets/engine.js"></script>
</head>
<body>
<script>
const ui = MF.shell({
  num: 3, title: 'Tree Learning', sub: 'DECISION TREES · OVERFITTING, LIVE',
  mission: 'Find the depth where held-out accuracy peaks (≥ 90%)',
  metric: { label: 'held-out accuracy', targetText: 'target 90', targetPct: 90, format: v => (v*100).toFixed(1)+'%' },
  prev: { href: '02-knn.html', name: 'Distance-Based Learning' },
  next: { href: '04-probability.html', name: 'Probability' }
});

let seed = 11, depth = 1;
let data = ML.genWavy(seed, 100, 22);
let tree = ML.buildTree(data.train, depth);
const triedDepths = {};   // depth -> {train, held}

const dCtl = MF.sliderCard(ui.rail, {
  id: 'depth', label: 'Tree depth — questions asked', min: 1, max: 8, step: 1, value: 1,
  ends: ['1 — one yes/no question', '8 — interrogation'], bigFmt: v => 'depth ' + v
});
dCtl.input.addEventListener('input', () => {
  depth = dCtl.value(); dCtl.sync();
  tree = ML.buildTree(data.train, depth);
  update();
});

MF.button(ui.rail, 'Deal me new data', 'seed ' + seed, function () {
  seed++; this.lastChild.textContent = 'seed ' + seed;
  data = ML.genWavy(seed, 100, 22);
  for (const k in triedDepths) delete triedDepths[k];
  tree = ML.buildTree(data.train, depth);
  drawChart(); update();
});

// depth-explorer chart
const chartCard = document.createElement('div');
chartCard.className = 'card card-pad';
chartCard.innerHTML = '<span class="label">Your depth experiments</span><canvas id="chart" style="width:100%;height:110px;margin-top:8px;cursor:default"></canvas><div class="range-ends"><span style="color:var(--accent)">— train acc</span><span style="color:var(--warn)">— held-out acc</span></div>';
ui.rail.appendChild(chartCard);
const chartFit = MF.setupCanvas(document.getElementById('chart'), 0.38, drawChart);

MF.legend(ui.rail, [
  ['<span style="width:11px;height:11px;border-radius:50%;background:var(--classA);display:block"></span>', 'class A — training'],
  ['<span style="width:10px;height:10px;background:var(--classB);transform:rotate(45deg);display:block;margin:0 1px"></span>', 'class B — training'],
  ['<span style="width:10px;height:10px;border:2px solid rgba(var(--text-rgb),.7);transform:rotate(45deg);display:block;margin:0 1px"></span>', 'held-out — the exam'],
  ['<span style="width:12px;height:3px;background:var(--accent);display:block"></span>', 'split — one yes/no question'],
]);

const quest = MF.questCtl(ui.quest, [
  { id: 'stump', title: 'Start with ONE question', desc: 'Depth = 1: the tree may ask a single yes/no question like “is x < 0.43?” — one straight cut. Look at the canvas: that line is the question. Move the slider to depth 2 to continue.' },
  { id: 'predict', title: 'Predict: crank depth to 8', desc: 'If the tree can ask 8 nested questions, held-out accuracy will…',
    predict: { q: '', options: ['Keep improving', 'Improve, then get WORSE', 'Not change'], answer: 1,
      whyRight: 'Yes — and this is the single most important idea in practical ML. Go prove it: push depth to 8 and watch the two accuracy lines split apart.',
      whyWrong: 'Feels like more questions = smarter, right? But watch: deep trees start memorizing the noisy training points and FAIL the exam. Push depth to 8 and watch the two accuracy lines split apart.' } },
  { id: 'overfit', title: 'Witness the overfit', desc: 'Set depth to 7 or 8. Training accuracy ≈ 100%, held-out drops, and the canvas grows weird slivers of territory wrapping single noisy points. That’s memorization, not learning.' },
  { id: 'mission', title: 'Find the sweet spot', desc: 'Walk the slider through every depth (your experiment chart is recording). Park it where held-out accuracy peaks at 90%+.' },
  { id: 'again', title: 'New data, new sweet spot', desc: 'Deal new data and find the peak again (≥ 88% counts). Notice it’s usually depth 2–4 — simple enough to generalize, deep enough to capture the wave.' },
], { onAll: showCode });

const insights = MF.insights(ui.side, [
  { id: 'q', title: 'A tree is 20 questions', lockedHint: 'see the depth-1 stump to unlock',
    body: 'Every split is a yes/no question about one feature: “is x < 0.43?”. Answers route you left or right until you hit a leaf, which just shouts a class. Depth = how many questions deep the interrogation can go. Each question shows up as one straight cut on the canvas.' },
  { id: 'of', title: 'Overfitting, defined by your own eyes', lockedHint: 'crank depth to 7–8 to unlock',
    body: 'A deep tree can carve a private rectangle around every noisy training point — perfect on training data, worse on the exam. The GAP between the two lines in your experiment chart IS overfitting. Same seesaw as k in KNN, opposite direction: here MORE capacity overfits.' },
  { id: 'ens', title: 'Why “random forest” exists', lockedHint: 'hit the mission to unlock',
    body: 'One deep tree overfits its own quirks. Train 100 trees on random subsets of the data and let them vote, and the quirks cancel out while the signal survives. That’s a random forest. Gradient boosting instead trains each new tree on the previous ones’ mistakes. Ensembles = teamwork against overfitting.' },
]);

const fit = MF.setupCanvas(ui.canvas, 0.66, update);

function record(d) {
  const trainAcc = ML.accuracy(data.train, (x,y) => ML.treePredict(tree, x, y));
  const heldAcc = ML.accuracy(data.held, (x,y) => ML.treePredict(tree, x, y));
  triedDepths[d] = { train: trainAcc, held: heldAcc };
  return { trainAcc, heldAcc };
}

function drawChart() {
  const ctx = chartFit.ctx, W = chartFit.W(), H = chartFit.H();
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle = 'rgba(' + MF.cssVar('--text-rgb') + ',0.15)';
  ctx.strokeRect(0.5, 0.5, W-1, H-1);
  const xs = d => (d-1)/7 * (W-24) + 12;
  const ys = a => H - 8 - (a-0.5)/0.5 * (H-16);
  ['train','held'].forEach((key,ki) => {
    ctx.strokeStyle = ki===0 ? MF.cssVar('--accent') : MF.cssVar('--warn');
    ctx.lineWidth = 2; ctx.beginPath();
    let started = false;
    for (let d=1; d<=8; d++) {
      if (!triedDepths[d]) { started=false; continue; }
      const x = xs(d), y = ys(Math.max(0.5, triedDepths[d][key]));
      started ? ctx.lineTo(x,y) : ctx.moveTo(x,y); started = true;
      MF.dot(ctx, x, y, 2.6, ctx.strokeStyle);
    }
    ctx.stroke();
  });
  // current depth marker
  ctx.strokeStyle = 'rgba(' + MF.cssVar('--text-rgb') + ',0.35)';
  ctx.setLineDash([3,3]); ctx.beginPath();
  ctx.moveTo(xs(depth), 4); ctx.lineTo(xs(depth), H-4); ctx.stroke(); ctx.setLineDash([]);
}

function narration(trainAcc, heldAcc) {
  const leaves = ML.treeLeaves(tree).length;
  if (depth === 1) return 'Depth 1: one question, ' + leaves + ' answers. Train ' + (trainAcc*100).toFixed(0) + '% / exam ' + (heldAcc*100).toFixed(0) + '%. A single straight cut can’t follow the wave — this is underfitting.';
  if (depth >= 7) return 'Depth ' + depth + ': ' + leaves + ' leaves. Train ' + (trainAcc*100).toFixed(0) + '% but exam only ' + (heldAcc*100).toFixed(0) + '%. See the skinny slivers hugging single points? The tree memorized the noise.';
  const gap = ((trainAcc - heldAcc)*100).toFixed(0);
  return 'Depth ' + depth + ' · ' + leaves + ' leaves · train ' + (trainAcc*100).toFixed(0) + '% vs exam ' + (heldAcc*100).toFixed(0) + '% (gap ' + gap + ' pts). The gap is the memorization tax.';
}

let deepSeen = false;
function update() {
  const ctx = fit.ctx, W = fit.W(), H = fit.H();
  const A = MF.cssVar('--classA'), B = MF.cssVar('--classB');
  ctx.clearRect(0,0,W,H);
  // leaf rectangles
  ML.treeLeaves(tree).forEach(l => {
    ctx.fillStyle = l.label ? B : A;
    ctx.globalAlpha = 0.10 + 0.13 * l.purity;
    ctx.fillRect(l.bounds.x0*W, l.bounds.y0*H, (l.bounds.x1-l.bounds.x0)*W, (l.bounds.y1-l.bounds.y0)*H);
  });
  ctx.globalAlpha = 1;
  MF.gridLines(ctx, W, H);
  // split lines
  ctx.strokeStyle = MF.cssVar('--accent'); ctx.lineWidth = 2;
  ML.treeSplits(tree).forEach(s => {
    ctx.beginPath();
    if (s.axis === 'x') { ctx.moveTo(s.t*W, s.bounds.y0*H); ctx.lineTo(s.t*W, s.bounds.y1*H); }
    else { ctx.moveTo(s.bounds.x0*W, s.t*H); ctx.lineTo(s.bounds.x1*W, s.t*H); }
    ctx.stroke();
  });
  data.train.forEach(p => {
    if (p.label===0) MF.dot(ctx, p.x*W, p.y*H, 4.5, A);
    else MF.diamond(ctx, p.x*W, p.y*H, 5, B);
  });
  data.held.forEach(p => {
    const pred = ML.treePredict(tree, p.x, p.y);
    MF.diamond(ctx, p.x*W, p.y*H, 6, MF.cssVar('--card'), p.label===0?A:B, 2.5);
    if (pred !== p.label) {
      ctx.strokeStyle = MF.cssVar('--bad'); ctx.lineWidth = 2;
      const x=p.x*W, y=p.y*H;
      ctx.beginPath(); ctx.moveTo(x-9,y-9); ctx.lineTo(x+9,y+9); ctx.moveTo(x+9,y-9); ctx.lineTo(x-9,y+9); ctx.stroke();
    }
  });

  const { trainAcc, heldAcc } = record(depth);
  drawChart();
  const ok = ui.metric.set(heldAcc, heldAcc*100, heldAcc >= (quest.isDone('mission') ? 0.88 : 0.90));
  ui.stageInfo.textContent = 'gini splits · leaves = ' + ML.treeLeaves(tree).length + ' · train acc ' + (trainAcc*100).toFixed(0) + '%';
  ui.stageExtra.textContent = 'depth ' + depth;
  ui.footL.textContent = 'each teal line = one yes/no question the tree asks';
  ui.footR.textContent = '× = held-out point this depth gets wrong';
  ui.narrate.say(narration(trainAcc, heldAcc));

  if (depth === 1) insights.unlock('q');
  if (depth >= 2 && quest.current() === 'stump') quest.done('stump');
  if (depth >= 7) { deepSeen = true; insights.unlock('of'); if (quest.current()==='overfit') quest.done('overfit'); }
  if (ok && quest.current() === 'mission' && deepSeen) { quest.done('mission'); insights.unlock('ens'); }
  if (heldAcc >= 0.88 && quest.current() === 'again') quest.done('again');
}
update();

function showCode() {
  MF.codeReveal(ui.codePanel, {
    moduleNum: 3, filename: 'decision_tree.py',
    intro: 'You watched a tree carve space with yes/no questions, and you found the depth where it stops learning and starts memorizing. Here’s the tree — and your depth-tuning experiment — in Python (sklearn this time, because you’ve earned the shortcut).',
    outro: 'Swap DecisionTreeClassifier for RandomForestClassifier(n_estimators=100) and you get the “100 trees voting” fix for overfitting — one line, same API.',
    lines: [
      { c: 'from sklearn.tree import DecisionTreeClassifier', n: 'sklearn’s tree does exactly what you watched: repeatedly pick the question (split) that best un-mixes the classes.' },
      { c: 'from sklearn.model_selection import train_test_split', n: 'We need an exam. You had held-out diamonds; this function deals them for us.' },
      { c: '', n: '' },
      { c: 'X_train, X_test, y_train, y_test = train_test_split(', n: 'Split the data…' },
      { c: '    X, y, test_size=0.2)', n: '…keep 20% locked away as the exam, exactly like your ringed diamonds. The model NEVER trains on these.' },
      { c: '', n: '' },
      { c: 'best_depth, best_score = None, 0', n: 'Your slider-walking, about to be automated.' },
      { c: 'for depth in range(1, 9):', n: 'You walked depths 1→8 by hand. Same loop.' },
      { c: '    tree = DecisionTreeClassifier(max_depth=depth)', n: 'max_depth is your slider: how many nested questions the interrogation may ask.' },
      { c: '    tree.fit(X_train, y_train)', n: 'Growing the tree: at each node, try every possible cut and keep the one that best separates the classes (lowest Gini impurity). Those were the teal lines.' },
      { c: '    score = tree.score(X_test, y_test)', n: 'Grade it on the exam — held-out accuracy, the orange line in your experiment chart. NOT training accuracy; that one lies (it hit ~100% at depth 8, remember).' },
      { c: '    if score > best_score:', n: 'Track the peak of the orange curve…' },
      { c: '        best_depth, best_score = depth, score', n: '…that’s your sweet spot. On your data it was probably depth 2–4.' },
      { c: '', n: '' },
      { c: 'print(best_depth, best_score)', n: 'Congratulations: this loop is called hyperparameter tuning with a validation set, and it’s half of every ML engineer’s job.' },
    ]
  });
}
</script>
</body>
</html>
